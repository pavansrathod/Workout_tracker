    ],
  },

  Tuesday: {

    emoji: "🏋️",
    tag: "PULL",
    exercises: [
      { name: "Dumbbell Bent Over Row", sets: 4, target: "10", type: "strength", video: "https://www.youtube.com/watch?v=roCP6wCXPqo" },
      { name: "Single Arm Dumbbell Row", sets: 3, target: "10", type: "strength", video: "https://www.youtube.com/watch?v=pYcpY20QaE8" },
      { name: "Band Lat Pulldown", sets: 4, target: "12-15", type: "strength", video: "https://www.youtube.com/watch?v=CAwf7n6Luuc" },
      { name: "Chest Supported DB Row", sets: 3, target: "12", type: "strength", video: "https://www.youtube.com/watch?v=MgCOXiqULQM" },
      { name: "Hammer Curls", sets: 3, target: "12", type: "strength", video: "https://www.youtube.com/watch?v=zC3nLlEvin4" },
      { name: "Band Face Pulls", sets: 3, target: "15", type: "strength", video: "https://www.youtube.com/watch?v=rep-qVOkqgk" },
    ],
  },

  Wednesday: {
    name: "Legs",
    emoji: "🦵",
    tag: "LEGS",
    exercises: [
      { name: "Kettlebell Goblet Squat", sets: 4, target: "12", type: "strength", video: "https://www.youtube.com/watch?v=MxsFDhcyFyE" },
      { name: "Bulgarian Split Squat", sets: 3, target: "10", type: "strength", video: "https://www.youtube.com/watch?v=2C-uNgKwPLE" },
      { name: "Dumbbell Romanian Deadlift", sets: 4, target: "10", type: "strength", video: "https://www.youtube.com/watch?v=JCXUYuzwNrM" },
      { name: "Dumbbell Reverse Lunges", sets: 3, target: "12", type: "strength", video: "https://www.youtube.com/watch?v=xrjMuqyR2yg" },
      { name: "Standing Calf Raises", sets: 4, target: "20", type: "bodyweight", video: "https://www.youtube.com/watch?v=gwLzBJYoWlI" },
      { name: "Plank", sets: 3, target: "45 sec", type: "timed", video: "https://www.youtube.com/watch?v=ASdvN_XEl_c" },
    ],
  },

  Thursday: {
    name: "Upper",
    emoji: "🔥",
    tag: "UPPER",
    exercises: [
      { name: "Incline Dumbbell Press", sets: 4, target: "10", type: "strength", video: "https://www.youtube.com/watch?v=8iPEnn-ltC8" },
      { name: "Chest Supported DB Row", sets: 4, target: "10", type: "strength", video: "https://www.youtube.com/watch?v=MgCOXiqULQM" },
      { name: "Arnold Press", sets: 3, target: "10", type: "strength", video: "https://www.youtube.com/watch?v=6Z15_WdXmVw" },
      { name: "Band Lat Pulldown", sets: 3, target: "15", type: "strength", video: "https://www.youtube.com/watch?v=CAwf7n6Luuc" },
      { name: "Close Grip Dumbbell Press", sets: 3, target: "12", type: "strength", video: "https://www.youtube.com/watch?v=LfyQBUKR8SE" },

    ],
  },

  Friday: {
    name: "Lower",
    emoji: "⚡",
    tag: "LOWER",
    exercises: [
      { name: "Dumbbell Sumo Squat", sets: 4, target: "12", type: "strength", video: "https://www.youtube.com/watch?v=_-MbgEeqmsc" },
      { name: "Dumbbell Stiff Leg Deadlift", sets: 4, target: "10", type: "strength", video: "https://www.youtube.com/watch?v=1uDiW5--rAE" },
      { name: "Step Ups", sets: 3, target: "12", type: "strength", video: "https://www.youtube.com/watch?v=dQqApCGd5Ss" },

    ],
  },

    name: "Cardio + Core",
    emoji: "🏃",
    tag: "CARDIO",
    exercises: [
      { name: "Incline Treadmill Walk", sets: 1, target: "30-45 mins", type: "cardio", video: "https://www.youtube.com/watch?v=vGvAFO_EwUQ" },

      { name: "Mountain Climbers", sets: 3, target: "30 sec", type: "bodyweight", video: "https://www.youtube.com/watch?v=nmwgirgXLYM" },

    ],
  },

  Sunday: {
    name: "Rest & Recover",
    emoji: "🛌",
    tag: "REST",
    exercises: [],
  },

const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];

const COLORS = {
  PUSH: "#ff6b00",
  PULL: "#7c3aed",
  LEGS: "#059669",
  UPPER: "#dc2626",
  LOWER: "#0284c7",
  CARDIO: "#d97706",
  REST: "#374151",
};

function App(){
  const [selectedDay, setSelectedDay] = useState("Monday");

  const [plan, setPlan] = useState(() => {
    const saved = localStorage.getItem("dynamic_plan");
    return saved ? JSON.parse(saved) : DEFAULT_PLAN;
  });

  useEffect(() => {
    localStorage.setItem("dynamic_plan", JSON.stringify(plan));
  }, [plan]);

  const workout = plan[selectedDay];
  const color = COLORS[workout.tag];

  const updateExerciseName = (index, value) => {
    const updated = {...plan};
    updated[selectedDay].exercises[index].name = value;
    setPlan(updated);
  };

  const addExercise = () => {
    const updated = {...plan};

    updated[selectedDay].exercises.push({
      name: "New Exercise",
      sets: 3,
      target: "10-12",
      type: "strength",
      video: ""
    });

    setPlan(updated);
  };

  const deleteExercise = (index) => {
    const updated = {...plan};
    updated[selectedDay].exercises.splice(index, 1);
    setPlan(updated);
  };

  const addSet = (index) => {
    const updated = {...plan};
    updated[selectedDay].exercises[index].sets += 1;
    setPlan(updated);
  };

  const removeSet = (index) => {
    const updated = {...plan};

    if(updated[selectedDay].exercises[index].sets > 1){
      updated[selectedDay].exercises[index].sets -= 1;
    }

    setPlan(updated);
  };

  return (
    <div>

      <div style={{
        background: color,
        padding: "22px",
        fontWeight: "bold",
        fontSize: "26px"
      }}>
        Dynamic Workout Tracker
      </div>

      <div style={{
        display: "flex",
        gap: "8px",
        overflowX: "auto",
        padding: "14px"
      }}>
        {DAYS.map(day => (
          <button
            key={day}
            onClick={() => setSelectedDay(day)}
            style={{
              background: selectedDay === day ? color : "#111",
              color: "white",
              border: "1px solid #222",
              padding: "10px 14px",
              borderRadius: "10px",
              cursor: "pointer",
              minWidth: "90px"
            }}
          >
            {day}
          </button>
        ))}
      </div>

      <div style={{ padding: "16px" }}>

        <div style={{
          display: "flex",
          alignItems: "center",
          gap: "10px",
          marginBottom: "18px"
        }}>
          <div style={{ fontSize: "34px" }}>
            {workout.emoji}
          </div>

          <div>
            <div style={{ fontSize: "20px", fontWeight: "bold" }}>
              {workout.name}
            </div>

            <div style={{ color: "#777", marginTop: "4px" }}>
              {workout.exercises.length} exercises
            </div>
          </div>
        </div>

        {
          workout.exercises.length === 0 ? (
            <div style={{
              background: "#111",
              padding: "40px",
              borderRadius: "14px",
              textAlign: "center"
            }}>
              <div style={{ fontSize: "60px" }}>🛌</div>
              <div style={{ marginTop: "10px", fontSize: "22px" }}>
                Rest Day
              </div>
            </div>
          ) : (
            <>
              {
                workout.exercises.map((ex, index) => (
                  <div
                    key={index}
                    style={{
                      background: "#111",
                      border: "1px solid #1f1f1f",
                      borderRadius: "14px",
                      padding: "16px",
                      marginBottom: "14px"
                    }}
                  >

                    <input
                      value={ex.name}
                      onChange={(e) => updateExerciseName(index, e.target.value)}
                      style={{
                        width: "100%",
                        background: "#1a1a1a",
                        border: "1px solid #333",
                        padding: "12px",
                        borderRadius: "10px",
                        color: "white",
                        fontSize: "16px",
                        marginBottom: "10px"
                      }}
                    />

                    <div style={{
                      display: "flex",
                      justifyContent: "space-between",
                      alignItems: "center",
                      marginBottom: "12px",
                      flexWrap: "wrap",
                      gap: "10px"
                    }}>
                      <div style={{ color: "#777" }}>
                        {ex.sets} sets • {ex.target}
                      </div>

                      {
                        ex.video && (
                          <a
                            href={ex.video}
                            target="_blank"
                            style={{
                              background: "#222",
                              color: "white",
                              textDecoration: "none",
                              padding: "8px 12px",
                              borderRadius: "8px"
                            }}
                          >
                            📹 Form
                          </a>
                        )
                      }
                    </div>

                    <div style={{
                      display: "flex",
                      gap: "8px",
                      marginBottom: "14px",
                      flexWrap: "wrap"
                    }}>
                      <button
                        onClick={() => addSet(index)}
                        style={{
                          background: "#00d084",
                          border: "none",
                          padding: "10px 12px",
                          borderRadius: "8px",
                          color: "white",
                          cursor: "pointer"
                        }}
                      >
                        + Set
                      </button>

                      <button
                        onClick={() => removeSet(index)}
                        style={{
                          background: "#ff8800",
                          border: "none",
                          padding: "10px 12px",
                          borderRadius: "8px",
                          color: "white",
                          cursor: "pointer"
                        }}
                      >
                        - Set
                      </button>

                      <button
                        onClick={() => deleteExercise(index)}
                        style={{
                          background: "#ff4444",
                          border: "none",
                          padding: "10px 12px",
                          borderRadius: "8px",
                          color: "white",
                          cursor: "pointer"
                        }}
                      >
                        Delete Exercise
                      </button>
                    </div>

                    {
                      Array.from({ length: ex.sets }).map((_, setIndex) => (
                        <div
                          key={setIndex}
                          style={{
                            display: "grid",
                            gridTemplateColumns: "60px 1fr 1fr",
                            gap: "8px",
                            marginBottom: "8px"
                          }}
                        >
                          <div style={{
                            background: color,
                            borderRadius: "8px",
                            display: "flex",
                            justifyContent: "center",
                            alignItems: "center",
                            fontWeight: "bold"
                          }}>
                            {setIndex + 1}
                          </div>

                          <input
                            placeholder="Weight"
                            style={{
                              background: "#1a1a1a",
                              border: "1px solid #333",
                              padding: "12px",
                              borderRadius: "8px",
                              color: "white"
                            }}
                          />

                          <input
                            placeholder="Reps"
                            style={{
                              background: "#1a1a1a",
                              border: "1px solid #333",
                              padding: "12px",
                              borderRadius: "8px",
                              color: "white"
                            }}
                          />
                        </div>
                      ))
                    }
                  </div>
                ))
              }

              <button
                onClick={addExercise}
                style={{
                  width: "100%",
                  padding: "16px",
                  background: "#00d084",
                  border: "none",
                  borderRadius: "14px",
                  color: "white",
                  fontSize: "16px",
                  fontWeight: "bold",
                  cursor: "pointer",
                  marginTop: "8px"
                }}
              >
                + Add Exercise
              </button>
            </>
          )
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script></body>

  const updateExerciseName = (index, value) => {
    const updated = {...plan};
    updated[selectedDay].exercises[index].name = value;
    setPlan(updated);
  };

  const addExercise = () => {
    const updated = {...plan};

    updated[selectedDay].exercises.push({
      name: "New Exercise",
      sets: 3,
      target: "10-12",
      type: "strength",
      video: ""
    });

    setPlan(updated);
  };

  const deleteExercise = (index) => {
    const updated = {...plan};
    updated[selectedDay].exercises.splice(index, 1);
    setPlan(updated);
  };

  const addSet = (index) => {
    const updated = {...plan};
    updated[selectedDay].exercises[index].sets += 1;
    setPlan(updated);
  };

  const removeSet = (index) => {
    const updated = {...plan};

    if(updated[selectedDay].exercises[index].sets > 1){
      updated[selectedDay].exercises[index].sets -= 1;
    }

    setPlan(updated);
  };

  return (
    <div>

      <div style={{
        background: color,
        padding: "22px",
        fontWeight: "bold",
        fontSize: "26px"
      }}>
        Dynamic Workout Tracker
      </div>

      <div style={{
        display: "flex",
        gap: "8px",
        overflowX: "auto",
        padding: "14px"
      }}>
        {DAYS.map(day => (
          <button
            key={day}
            onClick={() => setSelectedDay(day)}
            style={{
              background: selectedDay === day ? color : "#111",
              color: "white",
              border: "1px solid #222",
              padding: "10px 14px",
              borderRadius: "10px",
              cursor: "pointer",
              minWidth: "90px"
            }}
          >
            {day}
          </button>
        ))}
      </div>

      <div style={{ padding: "16px" }}>

        <div style={{
          display: "flex",
          alignItems: "center",
          gap: "10px",
          marginBottom: "18px"
        }}>
          <div style={{ fontSize: "34px" }}>
            {workout.emoji}
          </div>

          <div>
            <div style={{ fontSize: "20px", fontWeight: "bold" }}>
              {workout.name}
            </div>

            <div style={{ color: "#777", marginTop: "4px" }}>
              {workout.exercises.length} exercises
            </div>
          </div>
        </div>

        {
          workout.exercises.length === 0 ? (
            <div style={{
              background: "#111",
              padding: "40px",
              borderRadius: "14px",
              textAlign: "center"
            }}>
              <div style={{ fontSize: "60px" }}>🛌</div>
              <div style={{ marginTop: "10px", fontSize: "22px" }}>
                Rest Day
              </div>
            </div>
          ) : (
            <>
              {
                workout.exercises.map((ex, index) => (
                  <div
                    key={index}
                    style={{
                      background: "#111",
                      border: "1px solid #1f1f1f",
                      borderRadius: "14px",
                      padding: "16px",
                      marginBottom: "14px"
                    }}
                  >

                    <input
                      value={ex.name}
                      onChange={(e) => updateExerciseName(index, e.target.value)}
                      style={{
                        width: "100%",
                        background: "#1a1a1a",
                        border: "1px solid #333",
                        padding: "12px",
                        borderRadius: "10px",
                        color: "white",
                        fontSize: "16px",
                        marginBottom: "10px"
                      }}
                    />

                    <div style={{
                      display: "flex",
                      justifyContent: "space-between",
                      alignItems: "center",
                      marginBottom: "12px",
                      flexWrap: "wrap",
                      gap: "10px"
                    }}>
                      <div style={{ color: "#777" }}>
                        {ex.sets} sets • {ex.target}
                      </div>

                      {
                        ex.video && (
                          <a
                            href={ex.video}
                            target="_blank"
                            style={{
                              background: "#222",
                              color: "white",
                              textDecoration: "none",
                              padding: "8px 12px",
                              borderRadius: "8px"
                            }}
                          >
                            📹 Form
                          </a>
                        )
                      }
                    </div>

                    <div style={{
                      display: "flex",
                      gap: "8px",
                      marginBottom: "14px",
                      flexWrap: "wrap"
                    }}>
                      <button
                        onClick={() => addSet(index)}
                        style={{
                          background: "#00d084",
                          border: "none",
                          padding: "10px 12px",
                          borderRadius: "8px",
                          color: "white",
                          cursor: "pointer"
                        }}
                      >
                        + Set
                      </button>

                      <button
                        onClick={() => removeSet(index)}
                        style={{
                          background: "#ff8800",
                          border: "none",
                          padding: "10px 12px",
                          borderRadius: "8px",
                          color: "white",
                          cursor: "pointer"
                        }}
                      >
                        - Set
                      </button>

                      <button
                        onClick={() => deleteExercise(index)}
                        style={{
                          background: "#ff4444",
                          border: "none",
                          padding: "10px 12px",
                          borderRadius: "8px",
                          color: "white",
                          cursor: "pointer"
                        }}
                      >
                        Delete Exercise
                      </button>
                    </div>

                    {
                      Array.from({ length: ex.sets }).map((_, setIndex) => (
                        <div
                          key={setIndex}
                          style={{
                            display: "grid",
                            gridTemplateColumns: "60px 1fr 1fr",
                            gap: "8px",
                            marginBottom: "8px"
                          }}
                        >
                          <div style={{
                            background: color,
                            borderRadius: "8px",
                            display: "flex",
                            justifyContent: "center",
                            alignItems: "center",
                            fontWeight: "bold"
                          }}>
                            {setIndex + 1}
                          </div>

                          <input
                            placeholder="Weight"
                            style={{
                              background: "#1a1a1a",
                              border: "1px solid #333",
                              padding: "12px",
                              borderRadius: "8px",
                              color: "white"
                            }}
                          />

                          <input
                            placeholder="Reps"
                            style={{
                              background: "#1a1a1a",
                              border: "1px solid #333",
                              padding: "12px",
                              borderRadius: "8px",
                              color: "white"
                            }}
                          />
                        </div>
                      ))
                    }
                  </div>
                ))
              }

              <button
                onClick={addExercise}
                style={{
                  width: "100%",
                  padding: "16px",
                  background: "#00d084",
                  border: "none",
                  borderRadius: "14px",
                  color: "white",
                  fontSize: "16px",
                  fontWeight: "bold",
                  cursor: "pointer",
                  marginTop: "8px"
                }}
              >
                + Add Exercise
              </button>
            </>
          )
        }
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script></body>
</html>
