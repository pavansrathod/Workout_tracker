const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const TAG_COLORS={PUSH:"#ff6b00",PULL:"#7c3aed",LEGS:"#059669",UPPER:"#dc2626",LOWER:"#0284c7",CARDIO:"#d97706",REST:"#374151"};
const TYPE_CFG={
  strength:  {col1:"Weight (kg)",col2:"Reps done",    col2opt:false,badge:"WEIGHT",bc:"#ff6b00"},
  cardio:    {col1:"Duration",   col2:"Speed/Incline",col2opt:true, badge:"CARDIO",bc:"#d97706"},
  timed:     {col1:"Secs held",  col2:"Notes",        col2opt:true, badge:"TIMED", bc:"#7c3aed"},
  bodyweight:{col1:"Reps done",  col2:"Notes",        col2opt:true, badge:"BW",    bc:"#059669"},
};

const getTodayName=()=>{const d=new Date().getDay();return DAYS[d===0?6:d-1];};
const getDateStr=()=>new Date().toISOString().split("T")[0];
const getWeekStr=()=>{const n=new Date(),s=new Date(n);s.setDate(n.getDate()-n.getDay()+1);return s.toISOString().split("T")[0];};
const getDateTimeStr=()=>{const n=new Date();return n.toISOString().replace('T','_').replace(/:/g,'-').split('.')[0];};
const ld=(k,fb)=>{try{const v=JSON.parse(localStorage.getItem(k));return v!==null?v:fb;}catch{return fb;}};
const sv=(k,v)=>localStorage.setItem(k,JSON.stringify(v));

/* ── Log key uses date + day + exercise INDEX (not name) to avoid name collision bugs ── */
const logKey=(date,day,exIdx,si)=>`${date}|${day}|${exIdx}|${si}`;

/* ── Get last week's log for an exercise (by name match) to prefill ── */
const getLastWeekLog=(logs,day,exName,si)=>{
  const today=new Date();
  for(let w=1;w<=4;w++){
    const d=new Date(today);d.setDate(today.getDate()-(w*7));
    const dateStr=d.toISOString().split("T")[0];
    // Search all log keys for matching day+name+si
    const matchKey=Object.keys(logs).find(k=>{
      const parts=k.split("|");
      return parts[0]===dateStr && parts[1]===day && parseInt(parts[3])===si;
    });
    if(matchKey && logs[matchKey]?.exName===exName) return logs[matchKey];
  }
  // Also check any previous date with same day name
  const allKeys=Object.keys(logs).filter(k=>{
    const parts=k.split("|");
    return parts[1]===day && parseInt(parts[3])===si && logs[k]?.exName===exName && parts[0]!==getDateStr();
  }).sort().reverse();
  if(allKeys.length>0) return logs[allKeys[0]];
  return null;
};

function App(){
  const [selectedDay,setSelectedDay]=useState(getTodayName());
  const [activeTab,setActiveTab]=useState("today");
  const [logs,setLogs]=useState(()=>ld("p_logs2",{}));
  const [plan,setPlan]=useState(()=>ld("p_plan2",DEFAULT_PLAN));
  const [inputVals,setInputVals]=useState({});
  // doneSets: keyed by logKey — only for TODAY
  const [doneSets,setDoneSets]=useState({});
  const [toast,setToast]=useState(null);
  const [editModal,setEditModal]=useState(null);

  const [editTarget,setEditTarget]=useState("");
  const [editSets,setEditSets]=useState("");
  const [editVideo,setEditVideo]=useState("");

  const today=getTodayName();
  const todayDate=getDateStr();

  // ── Init doneSets from today's logs on mount ──
  useEffect(()=>{
    const todayDone={};
    Object.entries(logs).forEach(([k,v])=>{
      const parts=k.split("|");
      if(parts[0]===todayDate && v?.done) todayDone[k]=true;
    });
    setDoneSets(todayDone);
  },[]);

  // ── Auto weekly backup scheduler ──
  useEffect(()=>{
    const lastBackup=ld("p_last_backup","");
    const thisWeek=getWeekStr();

      // Check if it's Sunday (end of week) — trigger auto backup
      const dayNum=new Date().getDay();
      if(dayNum===0){
        setTimeout(()=>{
          triggerAutoBackup();
          sv("p_last_backup",thisWeek);

      }

  const logSet=(day,exIdx,exName,exType,si,v1,v2)=>{
    const k=logKey(todayDate,day,exIdx,si);
    const updated={...logs,[k]:{v1,v2,done:true,exName,exType,date:todayDate,day,exIdx,si}};
    updateLogs(updated);
    setDoneSets(p=>({...p,[k]:true}));
    showToast(`Set ${si+1} logged ✓`);
  };

  const getTodaySet=(day,exIdx,si)=>{
    const k=logKey(todayDate,day,exIdx,si);
    return logs[k]||null;
  };

  const isDoneToday=(day,exIdx,si)=>{
    const k=logKey(todayDate,day,exIdx,si);
    return !!doneSets[k]||!!logs[k]?.done;
  };

  const getDayPct=day=>{
    const p=plan[day];if(!p.exercises.length)return -1;
    let total=0,done=0;
    p.exercises.forEach((ex,exIdx)=>{
      for(let i=0;i<ex.sets;i++){total++;if(isDoneToday(day,exIdx,i))done++;}
    });
    return total?Math.round((done/total)*100):0;
  };

  const globalStats=()=>{
    let sets=0,days=new Set(),vol=0;
    Object.entries(logs).forEach(([k,v])=>{
      if(!v?.done)return;
      const parts=k.split("|");
      days.add(`${parts[0]}_${parts[1]}`);
      sets++;
      const w=parseFloat(v.v1||0),r=parseInt(v.v2||0);
      if(!isNaN(w)&&!isNaN(r))vol+=w*r;
    });
    return{sets,days:days.size,vol:Math.round(vol)};
  };

  // ── EDIT MODAL ──
  const openEdit=(day,idx)=>{
    const ex=plan[day].exercises[idx];
    setEditName(ex.name);setEditTarget(ex.target);setEditSets(String(ex.sets));setEditVideo(ex.video||"");
    setEditModal({day,idx,originalName:ex.name});

    if(!editModal)return;
    const np=JSON.parse(JSON.stringify(plan));
    np[editModal.day].exercises[editModal.idx]={

      name:editName.trim()||np[editModal.day].exercises[editModal.idx].name,
      target:editTarget.trim(),
      sets:Math.max(1,parseInt(editSets)||1),
      video:editVideo.trim()||np[editModal.day].exercises[editModal.idx].video,
    };
    updatePlan(np);setEditModal(null);showToast("Saved ✓");

  const resetToOriginal=()=>{
    if(!editModal)return;
    const np=JSON.parse(JSON.stringify(plan));
    const origDay=editModal.day;
    const origIdx=editModal.idx;
    const defEx=DEFAULT_PLAN[origDay]?.exercises[origIdx];
    if(defEx){
      np[origDay].exercises[origIdx]={...defEx};
      updatePlan(np);setEditModal(null);showToast("Reset to original ✓");
    } else {
      showToast("No original found","err");
    }
  };
  const deleteExercise=(day,idx)=>{
    const np=JSON.parse(JSON.stringify(plan));
    np[day].exercises.splice(idx,1);
    updatePlan(np);setEditModal(null);showToast("Removed");

  const swapExercise=(day,idx,alt)=>{

              <div style={{fontSize:48}}>🛌</div>
              <div style={{fontSize:16,fontWeight:700,marginTop:12}}>Rest Day</div>
              <div style={{fontSize:12,color:"#444",marginTop:6,lineHeight:1.6}}>Sleep 8hrs · Eat protein · Walk 8,000 steps</div>
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {workout.exercises.map((ex,idx)=>{
                const cfg=TYPE_CFG[ex.type]||TYPE_CFG.strength;
                const muscles=getMuscles(ex.name);
                const hasAlts=getAlts(ex.name).length>0;
                return(
                  <div key={`${selectedDay}_${idx}`} style={{background:"#0f0f0f",borderRadius:12,border:"1px solid #1a1a1a",overflow:"hidden"}}>
                    <div style={{padding:"11px 14px",borderBottom:"1px solid #141414"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ex.name}</div>
                          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4,flexWrap:"wrap"}}>
                            <span style={{fontSize:10,color:"#555"}}>{ex.sets} sets · {ex.target}</span>
                            <span style={{fontSize:9,padding:"2px 6px",borderRadius:4,background:`${cfg.bc}20`,color:cfg.bc,letterSpacing:1}}>{cfg.badge}</span>
                          </div>
                          {muscles.length>0&&(
                            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:6}}>
                              {muscles.map(m=><span key={m} style={{fontSize:9,background:"#ffffff08",border:"1px solid #2a2a2a",color:"#666",padding:"2px 7px",borderRadius:4}}>{m}</span>)}
                            </div>
                          )}
                        </div>
                        <div style={{display:"flex",gap:5,flexShrink:0}}>
                          {/* Edit — opens modal with Reset + Swap inside */}
                          <button onClick={()=>openEdit(selectedDay,idx)} style={{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:7,width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,cursor:"pointer"}}>✏️</button>
                          {ex.video&&<a href={ex.video} target="_blank" rel="noopener noreferrer" style={{background:"#ff000018",border:"1px solid #ff000040",borderRadius:7,width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>▶</a>}
                        </div>
                      </div>
                    </div>

                    <div style={{padding:"10px 14px",display:"flex",flexDirection:"column",gap:8}}>
                      {/* Column headers */}
                      <div style={{display:"flex",gap:7,alignItems:"center",paddingLeft:29}}>
                        <div style={{flex:1,fontSize:9,color:"#2a2a2a",letterSpacing:1}}>{cfg.col1.toUpperCase()}</div>
                        <div style={{flex:1,fontSize:9,color:"#2a2a2a",letterSpacing:1}}>{cfg.col2.toUpperCase()}{cfg.col2opt&&<span style={{color:"#1e1e1e"}}> (opt)</span>}</div>
                        <div style={{width:34,flexShrink:0}}/>
                      </div>

                      {Array.from({length:ex.sets}).map((_,si)=>{
                        const todayLog=getTodaySet(selectedDay,idx,si);
                        const lastLog=getLastWeekLog(logs,selectedDay,ex.name,si);
                        const done=isDoneToday(selectedDay,idx,si);
                        const inputKey=`${selectedDay}_${idx}_${si}`;
                        return(
                          <div key={si} style={{display:"flex",alignItems:"center",gap:7}}>
                            <div style={{width:22,height:22,borderRadius:5,flexShrink:0,background:done?"#00d084":"#161616",display:"flex",alignItems:"center",justifyContent:"center",fontSize:done?12:9,color:done?"#fff":"#333",transition:"background 0.3s"}}>{done?"✓":si+1}</div>
                            <input
                              style={{...INP,borderColor:!done&&lastLog?.v1?"#2a2a2a":"#222"}}
                              placeholder={todayLog?.v1||(lastLog?.v1?`Last: ${lastLog.v1}`:cfg.col1)}
                              defaultValue={todayLog?.v1||""}
                              onChange={e=>setInputVals(p=>({...p,[`${inputKey}_1`]:e.target.value}))}
                            />
                            <input
                              style={{...INP,borderColor:!done&&lastLog?.v2?"#2a2a2a":"#222"}}
                              placeholder={todayLog?.v2||(lastLog?.v2&&!cfg.col2opt?`Last: ${lastLog.v2}`:cfg.col2opt?"optional":cfg.col2)}
                              defaultValue={todayLog?.v2||""}
                              onChange={e=>setInputVals(p=>({...p,[`${inputKey}_2`]:e.target.value}))}
                            />
                            <button
                              onClick={()=>{
                                const v1=inputVals[`${inputKey}_1`]||todayLog?.v1||"-";
                                // col2 is optional for timed/bodyweight/cardio — use empty string if not entered
                                const v2=inputVals[`${inputKey}_2`]||todayLog?.v2||(cfg.col2opt?"":"-");
                                logSet(selectedDay,idx,ex.name,ex.type,si,v1,v2);
                              }}
                              style={{background:done?tc:"#161616",border:"none",borderRadius:6,padding:"7px 9px",color:done?"#fff":"#444",cursor:"pointer",fontSize:14,flexShrink:0,transition:"background 0.3s"}}>✓
                            </button>
                          </div>
                        );
                      })}

                      {/* Last week reference */}
                      {(()=>{
                        const lastRef=getLastWeekLog(logs,selectedDay,ex.name,0);
                        if(!lastRef||isDoneToday(selectedDay,idx,0))return null;
                        return<div style={{fontSize:9,color:"#2a2a2a",marginTop:2,letterSpacing:0.5}}>📅 Last session: {lastRef.v1} · {lastRef.v2} — try to beat it</div>;
                      })()}
                    </div>
                  </div>
                );
              })}

              {selectedDay!=="Sunday"&&(
                <button onClick={()=>addExercise(selectedDay)} style={{padding:13,borderRadius:12,background:"none",border:`1.5px dashed ${tc}60`,color:tc,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",letterSpacing:1}}>+ ADD EXERCISE</button>
              )}
            </div>
          )}
        </div>
      )}

      {/* ── WEEK ── */}
      {activeTab==="week"&&(
        <div style={{padding:16}}>
          <div style={{fontSize:10,letterSpacing:2,color:"#444",marginBottom:14}}>YOUR 6-DAY SPLIT</div>
          {DAYS.map(day=>{
            const pct=getDayPct(day),p=plan[day],isToday=day===today,dtc=TAG_COLORS[p?.tag]||"#ff6b00";
            return(
              <div key={day} onClick={()=>{setSelectedDay(day);setActiveTab("today");}} style={{background:"#0f0f0f",borderRadius:12,border:isToday?`1.5px solid ${dtc}`:"1px solid #1a1a1a",marginBottom:10,cursor:"pointer",padding:"13px 15px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                      <span style={{fontSize:16}}>{p?.emoji}</span>
                      <span style={{fontSize:13,fontWeight:600}}>{day}</span>
                      <span style={{fontSize:8,background:`${dtc}20`,color:dtc,padding:"2px 6px",borderRadius:4,letterSpacing:1}}>{p?.tag}</span>
                      {isToday&&<span style={{fontSize:8,background:dtc,color:"#fff",padding:"2px 6px",borderRadius:4}}>TODAY</span>}
                    </div>
                    <div style={{fontSize:10,color:"#444",marginTop:3}}>{p?.name}</div>
                    {p?.exercises.length>0&&<div style={{fontSize:9,color:"#333",marginTop:2}}>{p.exercises.length} exercises</div>}
                  </div>
                  <div style={{fontSize:18,fontWeight:700,color:pct===100?"#00d084":pct>0?dtc:"#282828"}}>{pct===100?"✓":pct>0?pct+"%":"–"}</div>
                </div>
                {pct>0&&pct<100&&<div style={{marginTop:8,height:2,borderRadius:1,background:"#1a1a1a"}}><div style={{height:"100%",width:pct+"%",background:dtc,borderRadius:1}}/></div>}
              </div>
            );
          })}
          <div style={{background:"#0f0f0f",borderRadius:12,border:"1px solid #1a1a1a",padding:14,marginTop:4}}>
            <div style={{fontSize:10,letterSpacing:2,color:"#444",marginBottom:12}}>MUSCLE FREQUENCY</div>
            {[
              {m:"Chest",     days:["Mon","Thu"],c:"#ff6b00"},
              {m:"Back",      days:["Tue","Thu"],c:"#7c3aed"},
              {m:"Shoulders", days:["Mon","Thu"],c:"#ff6b00"},
              {m:"Biceps",    days:["Tue","Thu"],c:"#7c3aed"},
              {m:"Triceps",   days:["Mon","Thu"],c:"#ff6b00"},
              {m:"Rear Delts",days:["Tue","Thu"],c:"#7c3aed"},
              {m:"Quads",     days:["Wed","Fri"],c:"#059669"},
              {m:"Hamstrings",days:["Wed","Fri"],c:"#059669"},
              {m:"Glutes",    days:["Wed","Fri"],c:"#059669"},
              {m:"Core",      days:["Fri","Sat"],c:"#0284c7"},
              {m:"Calves",    days:["Wed"],      c:"#059669"},
            ].map(r=>(
              <div key={r.m} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
                <div style={{fontSize:11,color:"#666",width:90,flexShrink:0}}>{r.m}</div>
                <div style={{display:"flex",gap:4,flex:1}}>{r.days.map(d=><span key={d} style={{fontSize:9,background:`${r.c}20`,color:r.c,padding:"2px 7px",borderRadius:4,letterSpacing:1}}>{d}</span>)}</div>
                <div style={{fontSize:11,fontWeight:700,color:r.days.length>1?"#00d084":"#555"}}>{r.days.length}×</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── HISTORY ── */}
      {activeTab==="history"&&(()=>{
        // Group logs by date+day
        const grouped={};
        Object.entries(logs).forEach(([k,v])=>{
          if(!v?.done)return;
          const grpKey=`${v.date}__${v.day}`;
          if(!grouped[grpKey])grouped[grpKey]={date:v.date,day:v.day,sets:[]};
          grouped[grpKey].sets.push(v);
        });
        return(
          <div style={{padding:16}}>
            <div style={{fontSize:10,letterSpacing:2,color:"#444",marginBottom:14}}>ALL SESSIONS · {Object.keys(grouped).length} days</div>
            {Object.keys(grouped).length===0?(
              <div style={{textAlign:"center",padding:40,color:"#444"}}>
                <div style={{fontSize:36,marginBottom:10}}>📋</div>
                <div>No sessions yet.</div>
              </div>
            ):(
              Object.entries(grouped).sort((a,b)=>b[0].localeCompare(a[0])).map(([grpKey,grp])=>{
                const p=plan[grp.day]||DEFAULT_PLAN[grp.day];if(!p)return null;
                const htc=TAG_COLORS[p.tag]||"#ff6b00";
                // Group sets by exercise name
                const byEx={};
                grp.sets.forEach(s=>{if(!byEx[s.exName])byEx[s.exName]=[];byEx[s.exName].push(s);});
                return(
                  <div key={grpKey} style={{background:"#0f0f0f",borderRadius:12,border:"1px solid #1a1a1a",marginBottom:10,overflow:"hidden"}}>
                    <div style={{padding:"12px 14px",borderBottom:"1px solid #141414",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:14}}>{p.emoji}</span>
                          <span style={{fontSize:13,fontWeight:600}}>{grp.day}</span>
                          <span style={{fontSize:8,background:`${htc}20`,color:htc,padding:"2px 6px",borderRadius:4}}>{p.tag}</span>
                        </div>
                        <div style={{fontSize:10,color:"#444",marginTop:2}}>{grp.date}</div>
                      </div>
                      <div style={{fontSize:11,color:htc,fontWeight:600}}>{grp.sets.length} sets</div>
                    </div>
                    <div style={{padding:"10px 14px"}}>
                      {Object.entries(byEx).map(([exName,sets])=>(
                        <div key={exName} style={{marginBottom:8}}>
                          <div style={{fontSize:10,color:"#555",marginBottom:4}}>{exName}</div>
                          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                            {sets.sort((a,b)=>a.si-b.si).map((s,i)=>(
                              <span key={i} style={{fontSize:10,background:"#141414",border:"1px solid #1e1e1e",borderRadius:4,padding:"3px 8px",color:"#777"}}>{s.v1}{s.v2&&s.v2!=="-"?` · ${s.v2}`:""}</span>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })
            )}
          </div>
        );
      })()}

      {/* ── BACKUP ── */}
      {activeTab==="backup"&&(
        <div style={{padding:16}}>
          <div style={{fontSize:10,letterSpacing:2,color:"#444",marginBottom:16}}>BACKUP & RESTORE</div>

          <div style={{background:"#0f0f0f",borderRadius:12,border:"1px solid #1a1a1a",padding:16,marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>💾 Manual Backup</div>
            <div style={{fontSize:11,color:"#555",marginBottom:12}}>Downloads logs + plan with date-time in filename.</div>
            <button onClick={exportManual} style={{width:"100%",padding:14,borderRadius:10,background:"#ff6b00",border:"none",color:"#fff",fontSize:13,fontWeight:700,letterSpacing:1,cursor:"pointer",fontFamily:"inherit"}}>DOWNLOAD BACKUP NOW</button>
          </div>

          <div style={{background:"#0f0f0f",borderRadius:12,border:"1px solid #1a1a1a",padding:16,marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:4}}>🔁 Weekly Auto Backup</div>
            <div style={{fontSize:11,color:"#555",marginBottom:4}}>Auto backup triggers every Sunday automatically when you open the app.</div>
            {autoBackupMsg&&<div style={{fontSize:10,color:"#059669",marginBottom:8}}>✓ {autoBackupMsg}</div>}
            <div style={{fontSize:10,color:"#333",marginBottom:12}}>Last backup week: {ld("p_last_backup","Never")}</div>
            <button onClick={()=>{triggerAutoBackup();sv("p_last_backup",getWeekStr());}} style={{width:"100%",padding:13,borderRadius:10,background:"#05966918",border:"1px solid #05966940",color:"#059669",fontSize:12,fontWeight:700,letterSpacing:1,cursor:"pointer",fontFamily:"inherit"}}>TRIGGER MANUAL WEEKLY BACKUP</button>
          </div>

          <div style={{background:"#0f0f0f",borderRadius:12,border:"1px solid #1a1a1a",padding:16,marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>📂 Import Backup</div>
            <div style={{fontSize:11,color:"#555",marginBottom:12}}>Restores logs and plan. Existing logs merged.</div>
            <label style={{display:"block",padding:14,borderRadius:10,background:"#1a1a1a",border:"1px solid #2a2a2a",color:"#666",fontSize:13,fontWeight:700,letterSpacing:1,cursor:"pointer",textAlign:"center",fontFamily:"inherit"}}>
              SELECT BACKUP FILE
              <input type="file" accept=".json" onChange={importAll} style={{display:"none"}}/>
            </label>
          </div>

          <div style={{background:"#0f0f0f",borderRadius:12,border:"1px solid #1a1a1a",padding:16,marginBottom:12}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>🔄 Reset Plan to Default</div>
            <div style={{fontSize:11,color:"#555",marginBottom:12}}>Resets all exercises. Logs are NOT affected.</div>
            <button onClick={()=>{updatePlan(DEFAULT_PLAN);showToast("Plan reset ✓");}} style={{width:"100%",padding:13,borderRadius:10,background:"#1a1a1a",border:"1px solid #ff444440",color:"#ff4444",fontSize:13,fontWeight:700,letterSpacing:1,cursor:"pointer",fontFamily:"inherit"}}>RESET ALL EXERCISES</button>
          </div>

          <div style={{padding:12,background:"#0a0a0a",borderRadius:8,border:"1px solid #1a1a1a"}}>
            <div style={{fontSize:10,color:"#333",letterSpacing:1}}>STORAGE</div>
            <div style={{fontSize:11,color:"#555",marginTop:4}}>{Object.keys(logs).filter(k=>logs[k]?.done).length} sets logged · {((JSON.stringify(logs).length+JSON.stringify(plan).length)/1024).toFixed(1)} KB</div>
          </div>
        </div>
      )}
      <div style={{height:50}}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
