<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LiftLog Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}body{ background:#0a0a0a; color:white; font-family:Inter,Arial,sans-serif; -webkit-tap-highlight-color:transparent; }

::-webkit-scrollbar{ display:none; }

button,input{ font-family:inherit; }

input{ outline:none; }

.app{ min-height:100vh; max-width:700px; margin:auto; padding-bottom:100px; }

.header{ padding:28px 20px; background:linear-gradient(135deg,#ff6b00,#ff8c42); }

.logo{ font-size:12px; letter-spacing:3px; opacity:0.8; }

.title{ font-size:30px; font-weight:800; margin-top:6px; }

.subtitle{ margin-top:8px; opacity:0.8; font-size:14px; }

.stats{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; padding:15px; }

.stat-card{ background:#111; border:1px solid #1f1f1f; border-radius:16px; padding:18px 12px; text-align:center; }

.stat-value{ font-size:24px; font-weight:800; color:#ff6b00; }

.stat-label{ margin-top:6px; font-size:11px; color:#666; letter-spacing:1px; }

.section{ padding:0 15px; }

.section-title{ margin:18px 0 12px; font-size:12px; color:#666; letter-spacing:2px; }

.exercise-card{ background:#111; border:1px solid #1f1f1f; border-radius:18px; padding:15px; margin-bottom:14px; }

.exercise-top{ display:flex; justify-content:space-between; gap:10px; align-items:center; }

.exercise-name{ flex:1; background:#1a1a1a; border:1px solid #2a2a2a; color:white; border-radius:10px; padding:12px; font-size:15px; font-weight:600; }

.icon-btn{ width:42px; height:42px; border:none; border-radius:12px; cursor:pointer; font-size:18px; }

.delete-btn{ background:#2a1111; color:#ff4d4d; }

.add-set-btn{ width:100%; margin-top:12px; background:#1b1b1b; border:1px dashed #333; color:#999; padding:12px; border-radius:12px; cursor:pointer; font-weight:700; }

.set-row{ display:grid; grid-template-columns:50px 1fr 1fr 50px; gap:8px; margin-top:10px; align-items:center; }

.set-badge{ background:#1d1d1d; border-radius:10px; height:44px; display:flex; align-items:center; justify-content:center; color:#888; font-weight:700; }

.set-input{ background:#1a1a1a; border:1px solid #2a2a2a; color:white; border-radius:10px; padding:12px; width:100%; }

.check-btn{ height:44px; border:none; border-radius:10px; background:#1f1f1f; color:#666; font-weight:800; cursor:pointer; }

.check-btn.done{ background:#00c26f; color:white; }

.bottom-bar{ position:fixed; bottom:0; left:0; right:0; background:#0d0d0d; border-top:1px solid #1f1f1f; padding:14px; }

.add-exercise{ width:100%; border:none; background:#ff6b00; color:white; font-size:15px; font-weight:800; padding:16px; border-radius:16px; cursor:pointer; }

.empty{ background:#111; border:1px dashed #333; border-radius:18px; padding:40px 20px; text-align:center; color:#666; }

.small{ font-size:12px; margin-top:8px; } </style>

</head>
<body>
<div id="root"></div><script type="text/babel">
const {useState,useEffect} = React;

const defaultWorkout = [
  {
    id:Date.now(),
    name:'Bench Press',
    sets:[
      {weight:'20',reps:'12',done:false},
      {weight:'20',reps:'10',done:false}
    ]
  },
  {
    id:Date.now()+1,
    name:'Incline Dumbbell Press',
    sets:[
      {weight:'15',reps:'12',done:false}
    ]
  }
]

function App(){

  const [workout,setWorkout] = useState(()=>{
    const saved = localStorage.getItem('dynamic_workout');
    return saved ? JSON.parse(saved) : defaultWorkout;
  });

  useEffect(()=>{
    localStorage.setItem('dynamic_workout',JSON.stringify(workout));
  },[workout]);

  const totalSets = workout.reduce((acc,ex)=>acc+ex.sets.length,0);
  const completedSets = workout.reduce((acc,ex)=>acc+ex.sets.filter(s=>s.done).length,0);

  const volume = workout.reduce((acc,ex)=>{
    return acc + ex.sets.reduce((a,s)=>{
      return a + ((Number(s.weight)||0) * (Number(s.reps)||0))
    },0)
  },0)

  const addExercise = ()=>{
    const newExercise = {
      id:Date.now(),
      name:'New Exercise',
      sets:[
        {weight:'',reps:'',done:false}
      ]
    }

    setWorkout([...workout,newExercise]);
  }

  const deleteExercise = (id)=>{
    setWorkout(workout.filter(ex=>ex.id !== id));
  }

  const updateExerciseName = (id,value)=>{
    setWorkout(workout.map(ex=>{
      if(ex.id === id){
        return {...ex,name:value}
      }
      return ex;
    }))
  }

  const addSet = (exerciseId)=>{
    setWorkout(workout.map(ex=>{
      if(ex.id === exerciseId){
        return {
          ...ex,
          sets:[...ex.sets,{weight:'',reps:'',done:false}]
        }
      }
      return ex;
    }))
  }

  const deleteSet = (exerciseId,setIndex)=>{
    setWorkout(workout.map(ex=>{
      if(ex.id === exerciseId){
        return {
          ...ex,
          sets:ex.sets.filter((_,i)=>i !== setIndex)
        }
      }
      return ex;
    }))
  }

  const updateSet = (exerciseId,setIndex,field,value)=>{
    setWorkout(workout.map(ex=>{
      if(ex.id === exerciseId){

        const updatedSets = ex.sets.map((set,i)=>{
          if(i === setIndex){
            return {
              ...set,
              [field]:value
            }
          }

          return set;
        })

        return {
          ...ex,
          sets:updatedSets
        }
      }

      return ex;
    }))
  }

  const toggleDone = (exerciseId,setIndex)=>{
    setWorkout(workout.map(ex=>{
      if(ex.id === exerciseId){

        const updatedSets = ex.sets.map((set,i)=>{
          if(i === setIndex){
            return {
              ...set,
              done:!set.done
            }
          }

          return set;
        })

        return {
          ...ex,
          sets:updatedSets
        }
      }

      return ex;
    }))
  }

  return (
    <div className="app">

      <div className="header">
        <div className="logo">LIFTLOG PRO</div>
        <div className="title">Workout Tracker</div>
        <div className="subtitle">Dynamic • Fast • Clean</div>
      </div>

      <div className="stats">

        <div className="stat-card">
          <div className="stat-value">{workout.length}</div>
          <div className="stat-label">EXERCISES</div>
        </div>

        <div className="stat-card">
          <div className="stat-value">{completedSets}/{totalSets}</div>
          <div className="stat-label">SETS</div>
        </div>

        <div className="stat-card">
          <div className="stat-value">{volume}</div>
          <div className="stat-label">VOLUME</div>
        </div>

      </div>

      <div className="section">

        <div className="section-title">TODAY WORKOUT</div>

        {
          workout.length === 0 && (
            <div className="empty">
              <div>No exercises added</div>
              <div className="small">Tap the button below to create one</div>
            </div>
          )
        }

        {
          workout.map((exercise)=>(
            <div className="exercise-card" key={exercise.id}>

              <div className="exercise-top">

                <input
                  className="exercise-name"
                  value={exercise.name}
                  onChange={(e)=>updateExerciseName(exercise.id,e.target.value)}
                />

                <button
                  className="icon-btn delete-btn"
                  onClick={()=>deleteExercise(exercise.id)}
                >
                  🗑
                </button>

              </div>

              {
                exercise.sets.map((set,setIndex)=>(
                  <div className="set-row" key={setIndex}>

                    <div className="set-badge">
                      {setIndex+1}
                    </div>

                    <input
                      className="set-input"
                      placeholder="Weight"
                      value={set.weight}
                      onChange={(e)=>updateSet(exercise.id,setIndex,'weight',e.target.value)}
                    />

                    <input
                      className="set-input"
                      placeholder="Reps"
                      value={set.reps}
                      onChange={(e)=>updateSet(exercise.id,setIndex,'reps',e.target.value)}
                    />

                    <button
                      className={`check-btn ${set.done ? 'done' : ''}`}
                      onClick={()=>toggleDone(exercise.id,setIndex)}
                    >
                      {set.done ? '✓' : '○'}
                    </button>

                    <div></div>
                    <button
                      style={{
                        gridColumn:'2/4',
                        background:'#191919',
                        border:'1px solid #2a2a2a',
                        color:'#777',
                        borderRadius:'10px',
                        padding:'10px',
                        cursor:'pointer'
                      }}
                      onClick={()=>deleteSet(exercise.id,setIndex)}
                    >
                      Delete Set
                    </button>

                  </div>
                ))
              }

              <button
                className="add-set-btn"
                onClick={()=>addSet(exercise.id)}
              >
                + ADD SET
              </button>

            </div>
          ))
        }

      </div>

      <div className="bottom-bar">
        <button
          className="add-exercise"
          onClick={addExercise}
        >
          + ADD EXERCISE
        </button>
      </div>

    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />)
</script></body>
</html><!DOCTYPE html><html lang="en">
